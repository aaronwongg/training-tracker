<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Tracker</title>
<style>
  :root {
    --bg: #f4f5f7; --card: #ffffff; --text: #1a1d21; --muted: #6b7280;
    --border: #e2e4e8; --accent: #2563eb; --accent-soft: #eff4ff;
    --done: #16a34a; --done-soft: #ecfdf3; --skip: #dc2626; --skip-soft: #fef2f2;
    --lift: #7c3aed; --bike: #0891b2; --run: #ea580c;
  }
  /* Manual choice (data-theme, set by the 🌙/☀️ toggle) wins; the media query
     is only the pre-JS fallback for system dark mode. */
  :root[data-theme="dark"] {
    --bg: #111418; --card: #1a1f26; --text: #e8eaed; --muted: #9aa2ad;
    --border: #2a313a; --accent: #5b8def; --accent-soft: #1d2735;
    --done: #34c268; --done-soft: #14261b; --skip: #ef6a5f; --skip-soft: #2b1a18;
    --lift: #a78bfa; --bike: #22d3ee; --run: #fb923c;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #111418; --card: #1a1f26; --text: #e8eaed; --muted: #9aa2ad;
      --border: #2a313a; --accent: #5b8def; --accent-soft: #1d2735;
      --done: #34c268; --done-soft: #14261b; --skip: #ef6a5f; --skip-soft: #2b1a18;
      --lift: #a78bfa; --bike: #22d3ee; --run: #fb923c;
    }
  }
  * { box-sizing: border-box; }
  /* The app owns the viewport: header on top, calendar fills whatever is left. */
  html, body { height: 100%; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 15px;
    display: flex; flex-direction: column; overflow: hidden; }
  header { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; flex: 0 0 auto;
    padding: 14px 20px; background: var(--card); border-bottom: 1px solid var(--border);
    z-index: 20; }
  header h1 { font-size: 18px; margin: 0 auto 0 0; }
  .month-nav { display: flex; align-items: center; gap: 8px; }
  .month-label { font-weight: 600; min-width: 180px; text-align: center; }
  button { font: inherit; cursor: pointer; border: 1px solid var(--border);
    background: var(--card); color: var(--text); border-radius: 8px; padding: 6px 12px; }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.ghost { border: none; background: none; color: var(--muted); padding: 4px 6px; }
  button.ghost:hover { color: var(--skip); }
  #save-status { color: var(--muted); font-size: 13px; min-width: 60px; }
  select, input, textarea { font: inherit; color: var(--text); background: var(--bg);
    border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; }
  input:focus, select:focus, textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }

  /* ---------- Layout: sidebar + calendar ---------- */
  .layout { display: flex; align-items: stretch; flex: 1 1 auto; min-height: 0; position: relative; }
  /* The calendar always spans the full width; the day drawer overlays it. */
  main { flex: 1 1 auto; min-width: 0; min-height: 0; padding: 18px;
    display: flex; flex-direction: column; }

  /* ---------- Saved workouts sidebar ---------- */
  /* A dedicated task bar: full height, flush against the left edge. */
  #sidebar { display: none; flex: 0 0 252px; min-height: 0; flex-direction: column; gap: 22px;
    background: var(--card); border-right: 1px solid var(--border);
    padding: 16px 14px; overflow-y: auto; }
  body.sidebar #sidebar { display: flex; }
  #sidebar h3 { margin: 0 4px 8px; font-size: 12px; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--muted); }
  .sum-row { display: flex; align-items: baseline; gap: 8px; padding: 5px 4px; font-size: 14px; }
  .sum-label { color: var(--muted); }
  .sum-val { margin-left: auto; font-weight: 600; text-align: right; }
  .sum-sub { display: block; font-size: 11.5px; color: var(--muted); font-weight: 400; }
  .sum-empty { font-size: 12.5px; color: var(--muted); margin: 2px 4px; line-height: 1.5; }
  .tpl-item { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 8px;
    background: var(--bg); border-left: 3px solid var(--muted); margin-bottom: 6px; cursor: pointer; }
  .tpl-item:hover { background: var(--accent-soft); }
  .tpl-item.lift { border-left-color: var(--lift); }
  .tpl-item.bike { border-left-color: var(--bike); }
  .tpl-item.run { border-left-color: var(--run); }
  .tpl-name { flex: 1; font-size: 13px; font-weight: 600; line-height: 1.3;
    overflow: hidden; text-overflow: ellipsis; }
  .tpl-name small { font-weight: 400; color: var(--muted); }
  .tpl-hint { font-size: 12px; color: var(--muted); line-height: 1.5; margin: 4px; }
  @media (max-width: 1000px) {
    /* Overlay the calendar, but stay inside .layout (which begins below the
       header) so the header — and the ☰ that closes this — is always clickable. */
    body.sidebar #sidebar { position: absolute; left: 0; top: 0; bottom: 0; width: 264px;
      z-index: 25; box-shadow: 8px 0 24px rgba(0,0,0,0.18); }
  }
  /* Compact header on small windows: icon-only title, tighter buttons. */
  @media (max-width: 820px) {
    header { padding: 8px 10px; gap: 6px; }
    header h1 { font-size: 16px; }
    .app-name, .hide-sm { display: none; }
    .month-label { min-width: 0; font-size: 14px; white-space: nowrap; }
    header button { padding: 5px 9px; font-size: 13px; }
    #save-status { min-width: 0; }
  }
  .cal-dow-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;
    margin-bottom: 8px; flex: 0 0 auto; }
  .cal-dow { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--muted); font-weight: 600; padding-left: 4px; }
  /* Rows share the leftover height equally, so the grid always fills the screen. */
  #calendar { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; gap: 8px; }
  .cal-week { flex: 1 1 0; min-height: 0; display: grid;
    grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .cal-cell { background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    min-height: 0; padding: 10px; cursor: pointer; display: flex; flex-direction: column;
    gap: 6px; transition: border-color 0.12s, box-shadow 0.12s;
    overflow-y: auto; overflow-x: hidden; }
  /* Week view: one tall row of 7 days; the weekday name moves into each cell. */
  body.weekview .cal-dow-row { display: none; }
  .cal-cell:hover { border-color: var(--accent); }
  .cal-cell.other { opacity: 0.5; }
  .cal-cell.today .cal-daynum { color: var(--accent); font-weight: 800; }
  .cal-cell.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }
  .cal-daynum { font-size: 15px; font-weight: 600; color: var(--muted); }
  .cal-cell.today .cal-daynum::after { content: " • today"; font-size: 11px; color: var(--accent); font-weight: 600; }
  .chip { font-size: 13px; line-height: 1.3; padding: 5px 8px; border-radius: 6px; flex: 0 0 auto;
    display: flex; align-items: center; gap: 6px; border-left: 3px solid var(--muted);
    background: var(--bg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chip.lift { border-left-color: var(--lift); }
  .chip.bike { border-left-color: var(--bike); }
  .chip.run { border-left-color: var(--run); }
  .chip.done { background: var(--done-soft); }
  .chip.skipped { background: var(--skip-soft); text-decoration: line-through; opacity: 0.7; }
  .chip.planned { opacity: 0.7; border-left-style: dashed; }
  .chip .stat { color: var(--muted); font-size: 11px; }

  /* ---------- Day editor drawer ---------- */
  #drawer { position: fixed; top: 0; right: 0; height: 100vh; width: 440px; z-index: 30;
    background: var(--card); border-left: 1px solid var(--border); box-shadow: -6px 0 24px rgba(0,0,0,0.10);
    display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.18s ease; }
  body.editing #drawer { transform: translateX(0); }
  .drawer-head { display: flex; align-items: center; gap: 10px; padding: 16px 18px;
    border-bottom: 1px solid var(--border); }
  .drawer-head h2 { margin: 0; font-size: 17px; }
  .drawer-head .sub { font-size: 12px; color: var(--muted); }
  .drawer-body { flex: 1; overflow-y: auto; padding: 16px 18px 60px; display: flex; flex-direction: column; gap: 14px; }
  #backdrop { display: none; }

  .activity { border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
  .activity.lift { border-top: 3px solid var(--lift); }
  .activity.bike { border-top: 3px solid var(--bike); }
  .activity.run { border-top: 3px solid var(--run); }
  .activity-head { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .status-group { display: flex; gap: 4px; margin-left: auto; }
  .status-group button { padding: 4px 9px; font-size: 12px; border-radius: 999px; }
  .status-group button.active-done { background: var(--done-soft); border-color: var(--done); color: var(--done); font-weight: 600; }
  .status-group button.active-skip { background: var(--skip-soft); border-color: var(--skip); color: var(--skip); font-weight: 600; }

  .exercise { margin-bottom: 12px; }
  .exercise-head { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
  .exercise-head input { flex: 1; font-weight: 600; }
  .set-row { display: grid; grid-template-columns: 46px 1fr 1fr 28px; gap: 6px; align-items: center; margin-bottom: 4px; }
  .set-row .setlabel { font-size: 12px; color: var(--muted); text-align: right; }
  .set-row input { width: 100%; }
  .set-head { display: grid; grid-template-columns: 46px 1fr 1fr 28px; gap: 6px;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin-bottom: 4px; }
  .set-head span { padding-left: 2px; }
  .add-link { font-size: 13px; color: var(--accent); border-style: dashed; padding: 4px 10px; margin-top: 2px; }

  .seg-presets { display: flex; gap: 5px; flex-wrap: wrap; margin: 6px 0; }
  .seg-presets button { font-size: 12px; padding: 3px 9px; border-radius: 999px; border-style: dashed; color: var(--accent); }
  .seg-head, .seg-row { display: grid; grid-template-columns: 1.1fr 1fr 1.1fr 28px; gap: 6px; align-items: center; }
  .seg-head { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin: 6px 0 4px; }
  .seg-head span { padding-left: 2px; }
  .seg-row { margin-bottom: 4px; }
  .seg-row input { width: 100%; }
  .climb-head, .climb-row { display: grid; grid-template-columns: 1.4fr 0.8fr 0.8fr 0.8fr 28px;
    gap: 6px; align-items: center; }
  .climb-head { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
    color: var(--muted); margin: 6px 0 4px; }
  .climb-head span { padding-left: 2px; }
  .climb-row { margin-bottom: 4px; }
  .climb-row input { width: 100%; }
  .field-label { font-size: 12px; color: var(--muted); font-weight: 600; margin: 6px 0 4px; }
  .actuals { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
  .actuals label { display: flex; flex-direction: column; gap: 3px; font-size: 12px; color: var(--muted); }
  .actuals input { width: 100px; }
  .day-notes { width: 100%; resize: vertical; min-height: 42px; font-size: 14px; }
  .add-activity-row { display: flex; gap: 8px; align-items: center; }
  .rest-note { color: var(--muted); font-style: italic; text-align: center; padding: 8px; }
  .drawer-foot { display: flex; justify-content: space-between; align-items: center;
    padding: 12px 18px; border-top: 1px solid var(--border); }

  @media (max-width: 900px) {
    #drawer { width: 100%; max-width: 460px; }
    body.editing #backdrop { display: block; position: fixed; inset: 0; z-index: 25; background: rgba(0,0,0,0.4); }
  }
  /* Too narrow for 7 columns: stack the week into full-width day rows and scroll. */
  @media (max-width: 700px) {
    main { padding: 12px; }
    body.weekview #calendar { overflow-y: auto; }
    body.weekview .cal-week { flex: 0 0 auto; grid-template-columns: 1fr;
      grid-auto-rows: minmax(74px, auto); }
  }

  /* ---------- Export modal ---------- */
  #export-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none;
    align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  #export-modal.open { display: flex; }
  .modal-box { background: var(--card); border-radius: 12px; max-width: 760px; width: 100%;
    max-height: 85vh; display: flex; flex-direction: column; padding: 20px; gap: 12px; }
  .modal-box h2 { margin: 0; font-size: 17px; }
  .modal-box textarea { flex: 1; min-height: 320px; font-family: Consolas, monospace;
    font-size: 13px; white-space: pre; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .range-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
  .range-row label { display: flex; flex-direction: column; gap: 3px; font-size: 12px; color: var(--muted); }
  .range-row .presets { display: flex; gap: 6px; margin-left: auto; }
  .range-row .presets button { font-size: 12px; padding: 5px 10px; }
  .range-count { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<header>
  <button id="sidebar-toggle" title="Show/hide sidebar">☰</button>
  <h1>🏋️ <span class="app-name">Training Tracker</span></h1>
  <span id="save-status"></span>
  <div class="month-nav">
    <button id="prev-month">‹</button>
    <span class="month-label" id="month-label"></span>
    <button id="next-month">›</button>
    <button id="today-btn">Today</button>
    <button id="view-toggle"></button>
  </div>
  <button id="theme-toggle" title="Toggle light/dark mode">🌙</button>
  <button class="primary" id="export-btn">Export<span class="hide-sm"> for Claude</span></button>
</header>

<div class="layout">
<aside id="sidebar">
  <section>
    <h3 id="summary-title">📊 Summary</h3>
    <div id="summary"></div>
  </section>
  <section>
    <h3>💪 Saved workouts</h3>
    <div id="tpl-list"></div>
    <p class="tpl-hint" id="tpl-hint">Build a workout in any day, then hit 💾 on the activity to save it here (e.g. "Push Day").
    Click a saved workout to add it to the day you have open.</p>
  </section>
</aside>
<main>
  <div class="cal-dow-row" id="cal-dow-row"></div>
  <div id="calendar"></div>
</main>
</div>

<div id="backdrop"></div>
<aside id="drawer" aria-hidden="true">
  <div class="drawer-head">
    <div>
      <h2 id="drawer-title"></h2>
      <div class="sub" id="drawer-sub"></div>
    </div>
    <button class="ghost" id="drawer-close" style="margin-left:auto;font-size:18px" title="Close (Esc)">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
  <div class="drawer-foot">
    <button class="ghost" id="clear-day" title="Remove all entries for this day">🗑 Clear day</button>
    <div class="add-activity-row">
      <select id="add-activity">
        <option value="">+ Add activity…</option>
        <option value="lift">Weightlifting</option>
        <option value="bike">Bike</option>
        <option value="run">Run</option>
      </select>
    </div>
  </div>
</aside>

<div id="export-modal">
  <div class="modal-box">
    <h2>Export — paste this into Claude for analysis</h2>
    <div class="range-row">
      <label>From <input type="date" id="export-from"></label>
      <label>To <input type="date" id="export-to"></label>
      <div class="presets">
        <button id="range-all">All</button>
        <button id="range-4w">Last 4 wks</button>
        <button id="range-12w">Last 12 wks</button>
      </div>
    </div>
    <span class="range-count" id="range-count"></span>
    <textarea id="export-text" readonly></textarea>
    <div class="modal-actions">
      <button id="copy-export" class="primary">Copy to clipboard</button>
      <button id="download-md">Download .md</button>
      <button id="download-json">Download .json</button>
      <button id="close-export">Close</button>
    </div>
  </div>
</div>

<script>
"use strict";

const DAY_ORDER = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
const DAY_FULL = { Mon: "Monday", Tue: "Tuesday", Wed: "Wednesday", Thu: "Thursday", Fri: "Friday", Sat: "Saturday", Sun: "Sunday" };
const TYPE_LABEL = { lift: "Weightlifting", bike: "Bike", run: "Run" };
const TYPE_ICON = { lift: "🏋️", bike: "🚴", run: "🏃" };
// Default sport per weekday for a fresh day with no history.
const DEFAULT_TYPE = { Mon: "lift", Tue: "bike", Wed: "lift", Thu: "bike", Fri: "lift", Sat: "run", Sun: null };
const SEG_PRESETS = ["Warmup", "Interval", "Recovery", "Steady", "Cooldown"];

// ---------- blank builders ----------
function blankSet() { return { reps: "", weight: "" }; }
function blankExercise() { return { name: "", sets: [blankSet(), blankSet(), blankSet()] }; }
function blankSegment(label) { return { label: label || "", amount: "", target: "" }; }
function blankCardio() { return { segments: [], climbs: [], distance: "", duration: "", elevation: "", power: "", notes: "" }; }
function blankClimb() { return { name: "", length: "", grade: "", gain: "" }; }
// Tolerates activities that never went through normalize() (e.g. a hand-edited
// workouts.json) — a missing title should read as unnamed, not throw.
function titleOf(act) { return (act.title || "").trim(); }
function blankActivity(type) {
  // `title` names the workout for every sport ("Push Day", "Threshold intervals").
  // Empty means "use the sport's default name" — see TYPE_LABEL.
  return { type, status: "planned", title: "",
    exercises: type === "lift" ? [blankExercise()] : [],
    cardio: blankCardio() };
}

let data = { days: {}, templates: [] };
let viewMonth = startOfMonth(new Date());
let weekStart = mondayOf(new Date()); // anchor for week view
let viewMode = "month";               // "month" | "week"
let lastAuto = "month";               // last size-based recommendation; see resize wiring
let editingKey = null;   // ISO date currently open in the drawer
let seededDraft = false; // true when the open day was just seeded and untouched

// ---------- date helpers ----------
function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
function endOfMonth(d) { return new Date(d.getFullYear(), d.getMonth() + 1, 0); }
function mondayOf(date) {
  const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  d.setDate(d.getDate() - ((d.getDay() + 6) % 7));
  return d;
}
function isoDate(d) {
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function parseISO(s) { const [y, m, d] = s.split("-").map(Number); return new Date(y, m - 1, d); }
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }
function weekdayKey(d) { return DAY_ORDER[(d.getDay() + 6) % 7]; }
function sameDay(a, b) { return isoDate(a) === isoDate(b); }

// ---------- migration / normalization ----------
function normalize(raw) {
  const out = { days: {}, templates: [] };
  if (raw && Array.isArray(raw.templates)) {
    out.templates = raw.templates.map(t => {
      const a = normalizeActivity(t);
      return { name: t.name || "Workout", type: a.type, exercises: a.exercises, cardio: a.cardio };
    });
  }
  const putDay = (key, day) => {
    // v2 days carry an `activities` list; the oldest v1 days stored a single
    // activity's fields (type/status/exercises/cardio) directly on the day.
    let acts = day.activities;
    if (!acts) acts = (day.type && day.type !== "rest") ? [day] : [];
    out.days[key] = { activities: acts.map(normalizeActivity), notes: day.notes || "" };
  };
  if (raw && raw.days) {
    for (const [key, day] of Object.entries(raw.days)) putDay(key, day);
  }
  if (raw && raw.weeks) {
    // Legacy week-keyed shape: expand each week into individual dates.
    for (const [monKey, week] of Object.entries(raw.weeks)) {
      const monday = parseISO(monKey);
      for (const day of week.days || []) {
        const date = isoDate(addDays(monday, DAY_ORDER.indexOf(day.day)));
        putDay(date, day);
      }
    }
  }
  return out;
}
function normalizeActivity(act) {
  // Some legacy activities stored a single type+status; new ones already match.
  const type = act.type || "lift";
  const status = act.status || "planned";
  let exercises = [];
  if (type === "lift") {
    exercises = (act.exercises || []).map(ex => {
      if (Array.isArray(ex.sets)) {
        return { name: ex.name || "", sets: ex.sets.map(s => ({ reps: s.reps || "", weight: s.weight || "" })) };
      }
      // Legacy: one row had scalar sets/reps/weight -> expand into per-set rows.
      const n = Math.max(1, parseInt(ex.sets, 10) || 1);
      const sets = [];
      for (let i = 0; i < n; i++) sets.push({ reps: ex.reps || "", weight: ex.weight || "" });
      return { name: ex.name || "", sets };
    });
    if (exercises.length === 0) exercises = [blankExercise()];
  }
  const oldC = act.cardio || {};
  // `title` used to live on cardio (and before that, cardio.workout); it's now
  // an activity-level field shared by lifts too.
  const title = act.title || oldC.title || oldC.workout || "";
  const cardio = {
    segments: Array.isArray(oldC.segments)
      ? oldC.segments.map(s => ({ label: s.label || "", amount: s.amount || "", target: s.target || "" }))
      : [],
    climbs: Array.isArray(oldC.climbs)
      ? oldC.climbs.map(c => ({ name: c.name || "", length: c.length || "", grade: c.grade || "", gain: c.gain || "" }))
      : [],
    distance: oldC.distance || "", duration: oldC.duration || "",
    elevation: oldC.elevation || "", power: oldC.power || "", notes: oldC.notes || ""
  };
  return { type, status, title, exercises, cardio };
}

// ---------- carry-forward seeding ----------
function seedDay(key) {
  const date = parseISO(key);
  // Look back up to 4 weeks for the same weekday to carry forward defaults.
  for (const back of [7, 14, 21, 28]) {
    const prev = data.days[isoDate(addDays(date, -back))];
    if (prev && prev.activities.length) {
      const clone = JSON.parse(JSON.stringify(prev));
      clone.notes = "";
      for (const act of clone.activities) {
        act.status = "planned";
        if (act.type === "lift") {
          if (!act.exercises.length) act.exercises = [blankExercise()];
        } else {
          // Keep the workout plan (title + segments); clear recorded actuals.
          act.cardio.distance = ""; act.cardio.duration = "";
          act.cardio.elevation = ""; act.cardio.power = ""; act.cardio.notes = "";
          act.cardio.climbs = [];
        }
      }
      return clone;
    }
  }
  // No history: use the default sport for this weekday.
  const t = DEFAULT_TYPE[weekdayKey(date)];
  return { activities: t ? [blankActivity(t)] : [], notes: "" };
}

// ---------- persistence ----------
function isEmptyDay(day) { return !day.activities.length && !(day.notes || "").trim(); }
// What actually gets written to disk: drop empty days (a rest day is just the
// absence of an entry — a saved empty day would block future carry-forward)
// and drop the currently open day if it's still an untouched seeded draft.
function buildPayload() {
  const days = {};
  for (const [k, day] of Object.entries(data.days)) {
    if (isEmptyDay(day)) continue;
    if (k === editingKey && seededDraft) continue;
    days[k] = day;
  }
  return { days, templates: data.templates };
}
let saveTimer = null;
function scheduleSave() {
  document.getElementById("save-status").textContent = "…";
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      const res = await fetch("/api/data", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(buildPayload()) });
      document.getElementById("save-status").textContent = res.ok ? "Saved ✓" : "Save failed!";
    } catch {
      document.getElementById("save-status").textContent = "Save failed!";
    }
  }, 500);
}
// Any real edit commits the open day (so seeded drafts stop being discardable).
function markEdited() { seededDraft = false; scheduleSave(); renderSummary(); }

// ---------- summary (sidebar) ----------
// The date span the calendar is currently showing: the viewed calendar month,
// or the viewed week in week view.
function visibleRange() {
  if (viewMode === "week") return { from: isoDate(weekStart), to: isoDate(addDays(weekStart, 6)) };
  return { from: isoDate(startOfMonth(viewMonth)), to: isoDate(endOfMonth(viewMonth)) };
}
function computeSummary(from, to) {
  const s = { lifts: 0, sets: 0, rides: 0, bikeMi: 0, bikeFt: 0,
    runs: 0, runMi: 0, runFt: 0, cardioMin: 0, skipped: 0 };
  for (const k of keysInRange(from, to)) {
    for (const act of data.days[k].activities) {
      if (act.status === "skipped") { s.skipped++; continue; }
      if (act.status !== "done") continue; // planned workouts aren't results yet
      if (act.type === "lift") {
        s.lifts++;
        s.sets += act.exercises.reduce((n, e) => n + e.sets.filter(x => x.reps || x.weight).length, 0);
      } else {
        const c = act.cardio;
        const mi = parseFloat(c.distance) || 0, ft = parseFloat(c.elevation) || 0;
        s.cardioMin += parseFloat(c.duration) || 0;
        if (act.type === "bike") { s.rides++; s.bikeMi += mi; s.bikeFt += ft; }
        else { s.runs++; s.runMi += mi; s.runFt += ft; }
      }
    }
  }
  return s;
}
function fmtNum(x) { return (Math.round(x * 10) / 10).toLocaleString(); }
function fmtMins(min) {
  min = Math.round(min);
  const h = Math.floor(min / 60);
  return h ? `${h}h ${min % 60}m` : `${min}m`;
}
function renderSummary() {
  const el = document.getElementById("summary");
  document.getElementById("summary-title").textContent = "📊 " +
    (viewMode === "week" ? "Week" : viewMonth.toLocaleDateString(undefined, { month: "long" })) + " summary";
  const { from, to } = visibleRange();
  const s = computeSummary(from, to);
  el.innerHTML = "";
  const row = (icon, label, val, sub) => {
    const div = document.createElement("div");
    div.className = "sum-row";
    div.innerHTML = `<span>${icon}</span><span class="sum-label">${label}</span>` +
      `<span class="sum-val">${escapeHtml(String(val))}` +
      (sub ? `<span class="sum-sub">${escapeHtml(sub)}</span>` : "") + `</span>`;
    el.appendChild(div);
  };
  if (s.lifts) row("🏋️", "Gym sessions", s.lifts, s.sets + " sets");
  if (s.rides) row("🚴", "Rides", s.rides, `${fmtNum(s.bikeMi)} mi · ${fmtNum(s.bikeFt)} ft gain`);
  if (s.runs) row("🏃", "Runs", s.runs, `${fmtNum(s.runMi)} mi · ${fmtNum(s.runFt)} ft gain`);
  if (s.cardioMin) row("⏱️", "Cardio time", fmtMins(s.cardioMin), "");
  if (s.skipped) row("⏭️", "Skipped", s.skipped, "");
  if (!s.lifts && !s.rides && !s.runs && !s.skipped) {
    el.innerHTML = '<p class="sum-empty">No completed workouts in this period yet.</p>';
  }
}

// ---------- view mode ----------
// Below these sizes a 6-row month grid gets too cramped to use, so show one week.
function autoMode() { return (window.innerWidth < 900 || window.innerHeight < 560) ? "week" : "month"; }
function weekLabel() {
  const end = addDays(weekStart, 6);
  const sameMonth = weekStart.getMonth() === end.getMonth();
  const a = weekStart.toLocaleDateString(undefined, { month: "short", day: "numeric" });
  const b = end.toLocaleDateString(undefined, sameMonth ? { day: "numeric" } : { month: "short", day: "numeric" });
  return `${a} – ${b}, ${end.getFullYear()}`;
}
function setMode(mode) {
  if (mode === viewMode) return;
  // Keep the two anchors in sync so switching views stays where you were.
  if (mode === "week") {
    const t = new Date();
    weekStart = (t >= startOfMonth(viewMonth) && t <= endOfMonth(viewMonth))
      ? mondayOf(t) : mondayOf(startOfMonth(viewMonth));
  } else {
    viewMonth = startOfMonth(weekStart);
  }
  viewMode = mode;
  renderApp();
}
// One step = one month in month view, one week in week view.
function stepView(dir) {
  stopEditing();
  if (viewMode === "week") weekStart = addDays(weekStart, 7 * dir);
  else viewMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth() + dir, 1);
  renderApp();
}

// ---------- calendar ----------
function renderCalendar() {
  const isWeek = viewMode === "week";
  document.body.classList.toggle("weekview", isWeek);
  document.getElementById("view-toggle").textContent = isWeek ? "Week" : "Month";
  document.getElementById("view-toggle").title =
    isWeek ? "Switch to month view" : "Switch to week view";
  document.getElementById("month-label").textContent = isWeek
    ? weekLabel()
    : viewMonth.toLocaleDateString(undefined, { month: "long", year: "numeric" });
  const dow = document.getElementById("cal-dow-row");
  dow.innerHTML = DAY_ORDER.map(d => `<div class="cal-dow">${d}</div>`).join("");

  const cal = document.getElementById("calendar");
  cal.innerHTML = "";
  const today = new Date();
  if (isWeek) {
    cal.appendChild(renderWeekRow(weekStart, today, true));
  } else {
    const last = endOfMonth(viewMonth);
    let ws = mondayOf(viewMonth);
    for (let w = 0; w < 6; w++) {
      cal.appendChild(renderWeekRow(ws, today, false));
      ws = addDays(ws, 7);
      if (ws > last) break; // stop once we've covered the month
    }
  }
  renderSummary(); // the summary tracks whatever period the calendar shows
}

function renderWeekRow(start, today, showDayName) {
  const row = document.createElement("div");
  row.className = "cal-week";
  for (let i = 0; i < 7; i++) row.appendChild(renderCell(addDays(start, i), today, showDayName));
  return row;
}

function renderCell(date, today, showDayName) {
  const key = isoDate(date);
  const cell = document.createElement("div");
  cell.className = "cal-cell";
  // Dimming "other" days only means something against a month grid.
  if (!showDayName && date.getMonth() !== viewMonth.getMonth()) cell.classList.add("other");
  if (sameDay(date, today)) cell.classList.add("today");
  if (key === editingKey) cell.classList.add("selected");

  const num = document.createElement("div");
  num.className = "cal-daynum";
  // Week view has no weekday header row, so name the day in the cell.
  num.textContent = showDayName ? `${weekdayKey(date)} ${date.getDate()}` : date.getDate();
  cell.appendChild(num);

  const day = data.days[key];
  if (day) for (const act of day.activities) cell.appendChild(chipFor(act));

  cell.onclick = () => openDay(key);
  return cell;
}

function chipFor(act) {
  const chip = document.createElement("div");
  chip.className = `chip ${act.type} ${act.status}`;
  // The workout's name leads; the sport's label stands in when it's unnamed.
  const label = titleOf(act) || TYPE_LABEL[act.type];
  let stat = "";
  if (act.type === "lift") {
    const named = act.exercises.filter(e => e.name.trim()).length;
    if (named) stat = named + " ex";
  } else if (act.cardio.distance) stat = act.cardio.distance + "mi";
  else if (act.cardio.duration) stat = act.cardio.duration + "min";
  chip.innerHTML = `<span>${TYPE_ICON[act.type]}</span>` +
    `<span style="overflow:hidden;text-overflow:ellipsis">${escapeHtml(label)}</span>` +
    (stat ? `<span class="stat">${escapeHtml(stat)}</span>` : "");
  return chip;
}
function escapeHtml(s) { return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }

// ---------- day editor ----------
function stopEditing() {
  if (editingKey && seededDraft) delete data.days[editingKey]; // discard untouched seed
  editingKey = null; seededDraft = false;
  document.body.classList.remove("editing");
  document.getElementById("drawer").setAttribute("aria-hidden", "true");
}
function openDay(key) {
  if (editingKey && editingKey !== key && seededDraft) delete data.days[editingKey];
  editingKey = key;
  // Re-seed days that don't exist OR exist but are empty — an empty day is
  // just a rest day, and reopening it should offer the carried-forward plan.
  if (!data.days[key] || isEmptyDay(data.days[key])) { data.days[key] = seedDay(key); seededDraft = true; }
  else seededDraft = false;
  document.body.classList.add("editing");
  document.getElementById("drawer").setAttribute("aria-hidden", "false");
  renderApp();
}
function closeDay() { stopEditing(); renderApp(); }

function renderApp() { renderCalendar(); renderSidebar(); if (editingKey) renderDrawer(); }

// Climbs worth highlighting from a ride: name, length, avg grade, gain.
function renderClimbs(act) {
  const c = act.cardio;
  const box = document.createElement("div");

  label.className = "field-label"; label.textContent = "⛰️ Climbs";

    box.appendChild(head);
  }
  c.climbs.forEach((cl, i) => {
    const row = document.createElement("div");
    row.className = "climb-row";
    const mkInp = (field, ph) => {
      const inp = document.createElement("input");
      inp.placeholder = ph; inp.value = cl[field];
      inp.oninput = () => {
        cl[field] = inp.value;
        // Grade is derivable from length + gain; offer it as the placeholder.
        if (field !== "grade") gradeInp.placeholder = climbGradeHint(cl);
        markEdited();
      };
      return inp;
    };
    const name = mkInp("name", "e.g. Old Mill Rd");
    const len = mkInp("length", "1.0");
    const gradeInp = mkInp("grade", climbGradeHint(cl));
    const gain = mkInp("gain", "351");
    const del = document.createElement("button");
    del.className = "ghost"; del.textContent = "✕"; del.title = "Remove climb";
    del.onclick = () => { c.climbs.splice(i, 1); markEdited(); renderApp(); };

  const add = document.createElement("button");
  add.className = "add-link"; add.textContent = "+ Add climb";
  add.onclick = () => { c.climbs.push(blankClimb()); markEdited(); renderApp(); };
  box.appendChild(add);
  return box;
}
// Suggested avg grade from length (mi) and gain (ft): gain / (mi * 5280) * 100.
function climbGradeHint(cl) {
  const mi = parseFloat(cl.length), ft = parseFloat(cl.gain);
  if (mi > 0 && ft > 0) return (ft / (mi * 5280) * 100).toFixed(1);
  return "6.8";
}

// ---------- saved workout templates ----------
function saveTemplate(act) {
  const name = prompt('Name this workout (e.g. "Push Day"):', act.title || "");
  if (!name || !name.trim()) return;
  const tpl = JSON.parse(JSON.stringify({ name: name.trim(), type: act.type, exercises: act.exercises, cardio: act.cardio }));
  // Templates store the plan, not one day's results.
  tpl.cardio.distance = tpl.cardio.duration = tpl.cardio.elevation = tpl.cardio.power = tpl.cardio.notes = "";
  tpl.cardio.climbs = [];
  data.templates.push(tpl);
  // Naming the template names the workout it came from, if it had no name yet.
  if (!titleOf(act)) act.title = tpl.name;
  scheduleSave(); renderApp();
}

// An activity that holds no real content yet (e.g. the blank seeded default) —
// applying a template replaces it instead of stacking a second activity.
function isBlankActivity(act) {
  if (act.status !== "planned") return false;
  const hasLift = act.exercises.some(e => e.name.trim() || e.sets.some(s => s.reps || s.weight));
  const c = act.cardio;
  const hasCardio = c.segments.length || (c.climbs || []).length || c.distance || c.duration || c.elevation || c.power || c.notes;
  return !titleOf(act) && !hasLift && !hasCardio;
}

function applyTemplate(tpl) {
  if (!editingKey) {
    alert("Click a day on the calendar first, then click a saved workout to add it to that day.");
    return;
  }
  // The saved workout's name becomes the activity's name.
  const act = { type: tpl.type, status: "planned", title: tpl.name,
    exercises: JSON.parse(JSON.stringify(tpl.exercises || [])),
    cardio: JSON.parse(JSON.stringify(tpl.cardio || blankCardio())) };
  if (act.type === "lift" && !act.exercises.length) act.exercises = [blankExercise()];
  const day = data.days[editingKey];
  const blankIdx = day.activities.findIndex(isBlankActivity);
  if (blankIdx >= 0) day.activities.splice(blankIdx, 1, act);
  else day.activities.push(act);
  markEdited(); renderApp();
}

function renderSidebar() {
  const list = document.getElementById("tpl-list");
  list.innerHTML = "";
  document.getElementById("tpl-hint").style.display = data.templates.length ? "none" : "block";
  data.templates.forEach((tpl, i) => {
    const item = document.createElement("div");
    item.className = "tpl-item " + tpl.type;
    const summary = tpl.type === "lift"
      ? tpl.exercises.filter(e => e.name.trim()).length + " exercises"
      : (tpl.cardio.segments.length ? tpl.cardio.segments.length + " segments" : TYPE_LABEL[tpl.type]);
    item.innerHTML = `<span>${TYPE_ICON[tpl.type]}</span>` +
      `<span class="tpl-name">${escapeHtml(tpl.name)}<br><small>${escapeHtml(summary)}</small></span>`;
    const del = document.createElement("button");
    del.className = "ghost"; del.textContent = "✕"; del.title = "Delete saved workout";
    del.onclick = (e) => {
      e.stopPropagation();
      if (confirm(`Delete saved workout "${tpl.name}"?`)) {
        data.templates.splice(i, 1); scheduleSave(); renderSidebar();
      }
    };
    item.appendChild(del);
    item.onclick = () => applyTemplate(tpl);
    list.appendChild(item);
  });
}

// ---------- export ----------
// Keys within [from, to] inclusive; empty bound means unbounded. ISO dates
// sort correctly as strings, so plain comparison is enough.
function keysInRange(from, to) {
  return Object.keys(data.days)
    .filter(k => (!from || k >= from) && (!to || k <= to))
    .sort();
}
function buildMarkdown(from, to) {
  const rangeStr = (from || to)
    ? `Range: ${from || "start"} to ${to || "today"}`
    : "Range: all data";
  const lines = [
    "# Training Log",
    `Exported: ${isoDate(new Date())}`,
    rangeStr,
    "",
    "Multi-sport athlete (weightlifting, biking, running). A day can hold multiple activities.",
    "Lifts list each set as weight×reps (so fatigue across sets is visible).",
    "Cardio shows the planned interval structure plus recorded totals. Statuses: done, skipped, planned.",
    ""
  ];
  const keys = keysInRange(from, to);
  for (const key of keys) {
    const day = data.days[key];
    if (!day.activities.length && !(day.notes || "").trim()) continue;
    const date = parseISO(key);
    lines.push(`## ${DAY_FULL[weekdayKey(date)]} ${key}`);
    for (const act of day.activities) {
      const named = titleOf(act) ? " — " + titleOf(act) : "";
      if (act.type === "lift") {
        lines.push(`**Weightlifting — ${act.status}**${named}`);
        for (const ex of act.exercises) {
          if (!ex.name.trim() && !ex.sets.some(s => s.reps || s.weight)) continue;
          const setStr = ex.sets
            .filter(s => s.reps || s.weight)
            .map(s => `${s.weight || "?"}lb×${s.reps || "?"}`).join(", ");
          lines.push(`- ${ex.name || "(unnamed)"}: ${setStr || "(no sets logged)"}`);
        }
      } else {
        const c = act.cardio;
        lines.push(`**${TYPE_LABEL[act.type]} — ${act.status}**${named}`);
        const segs = c.segments.filter(s => s.label || s.amount || s.target);
        if (segs.length) {
          const parts = segs.map(s => {
            let p = s.label || "";
            if (s.amount) p += (p ? " " : "") + s.amount;
            if (s.target) p += " @ " + s.target;
            return p.trim();
          });
          lines.push(`Structure: ${parts.join("; ")}`);
        }
        const tot = [];
        if (c.distance) tot.push(`${c.distance} mi`);
        if (c.duration) tot.push(`${c.duration} min`);
        if (c.elevation) tot.push(`${c.elevation} ft gain`);
        if (c.power) tot.push(`${c.power} W avg`);
        if (c.notes) tot.push(`effort ${c.notes}`);
        if (tot.length) lines.push(`Totals: ${tot.join(" · ")}`);
        for (const cl of (c.climbs || [])) {
          if (!(cl.name || cl.length || cl.grade || cl.gain)) continue;
          lines.push(`Climb: ${cl.name || "(unnamed)"} — ${cl.length || "?"} mi @ ${cl.grade || climbGradeHint(cl)}% avg · ${cl.gain || "?"} ft gain`);
        }
      }
      lines.push("");
    }
    if ((day.notes || "").trim()) lines.push(`Notes: ${day.notes.trim()}`, "");
  }
  return lines.join("\n");
}

function download(filename, text, mime) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([text], { type: mime }));
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ---------- wiring ----------
document.getElementById("prev-month").onclick = () => stepView(-1);
document.getElementById("next-month").onclick = () => stepView(1);
document.getElementById("today-btn").onclick = () => {
  viewMonth = startOfMonth(new Date());
  weekStart = mondayOf(new Date());
  openDay(isoDate(new Date()));
};
document.getElementById("view-toggle").onclick = () => setMode(viewMode === "month" ? "week" : "month");
// Auto-switch whenever the window CROSSES the size threshold. A manual
// Month/Week choice is respected while the window stays in the same size
// class, but the next crossing puts auto back in charge — so shrinking the
// window always gets week view, and growing it always gets month view back.
window.addEventListener("resize", () => {
  const auto = autoMode();
  if (auto !== lastAuto) { lastAuto = auto; setMode(auto); }
});

// ---------- wheel navigation ----------
// Walk up from the wheel target looking for something that can actually scroll
// in this direction (an overflowing day cell, or the stacked week list). If we
// find one, let the browser scroll it instead of changing the month.
function scrollableUnder(from, dy) {
  let el = from;
  while (el && el !== document.body) {
    const oy = getComputedStyle(el).overflowY;
    if ((oy === "auto" || oy === "scroll") && el.scrollHeight > el.clientHeight + 1) {
      const atTop = el.scrollTop <= 0;
      const atBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 1;
      if (!(dy < 0 && atTop) && !(dy > 0 && atBottom)) return el;
    }
    el = el.parentElement;
  }
  return null;
}
let wheelReadyAt = 0;
document.getElementById("calendar").addEventListener("wheel", (e) => {
  if (!e.deltaY) return;
  if (scrollableUnder(e.target, e.deltaY)) return;
  e.preventDefault();
  // One trackpad swipe fires a burst of events; ignore the tail.
  const now = Date.now();
  if (now < wheelReadyAt) return;
  wheelReadyAt = now + 350;
  stepView(e.deltaY < 0 ? -1 : 1);
}, { passive: false });
document.getElementById("sidebar-toggle").onclick = () => document.body.classList.toggle("sidebar");

// ---------- theme ----------
function systemDark() {
  return !!(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
}
function currentTheme() {
  return localStorage.getItem("theme") || (systemDark() ? "dark" : "light");
}
function applyTheme(theme, persist) {
  document.documentElement.dataset.theme = theme;
  if (persist) localStorage.setItem("theme", theme);
  const btn = document.getElementById("theme-toggle");
  btn.textContent = theme === "dark" ? "☀️" : "🌙";
  btn.title = theme === "dark" ? "Switch to light mode" : "Switch to dark mode";
}
document.getElementById("theme-toggle").onclick = () =>
  applyTheme(currentTheme() === "dark" ? "light" : "dark", true);
applyTheme(currentTheme(), false); // honor a saved choice, else follow the system
document.getElementById("drawer-close").onclick = closeDay;
document.getElementById("backdrop").onclick = closeDay;
document.getElementById("clear-day").onclick = () => {
  if (confirm("Remove all activities and notes for this day?")) {
    delete data.days[editingKey]; seededDraft = false; scheduleSave(); closeDay();
  }
};
document.getElementById("add-activity").onchange = (e) => {
  if (!e.target.value) return;
  data.days[editingKey].activities.push(blankActivity(e.target.value));
  e.target.value = "";
  markEdited(); renderApp();
};
document.addEventListener("keydown", (e) => { if (e.key === "Escape" && editingKey) closeDay(); });

function exportRange() {
  return { from: document.getElementById("export-from").value, to: document.getElementById("export-to").value };
}
function refreshExport() {
  const { from, to } = exportRange();
  const keys = keysInRange(from, to);
  document.getElementById("export-text").value = buildMarkdown(from, to);
  const days = keys.filter(k => data.days[k].activities.length || (data.days[k].notes || "").trim()).length;
  document.getElementById("range-count").textContent = `${days} day${days === 1 ? "" : "s"} with entries in range`;
}
function dataInRange(from, to) {
  const days = {};
  for (const k of keysInRange(from, to)) days[k] = data.days[k];
  return { days };
}
function rangeSuffix() {
  const { from, to } = exportRange();
  return (from || to) ? `_${from || "start"}_to_${to || "today"}` : "";
}

document.getElementById("export-btn").onclick = () => {
  const keys = Object.keys(data.days).sort();
  // Default the range to the full span of logged data (or today if empty).
  document.getElementById("export-from").value = keys.length ? keys[0] : isoDate(new Date());
  document.getElementById("export-to").value = keys.length ? keys[keys.length - 1] : isoDate(new Date());
  refreshExport();
  document.getElementById("export-modal").classList.add("open");
};
document.getElementById("export-from").oninput = refreshExport;
document.getElementById("export-to").oninput = refreshExport;
document.getElementById("range-all").onclick = () => {
  const keys = Object.keys(data.days).sort();
  document.getElementById("export-from").value = keys.length ? keys[0] : "";
  document.getElementById("export-to").value = keys.length ? keys[keys.length - 1] : "";
  refreshExport();
};
document.getElementById("range-4w").onclick = () => setPresetWeeks(4);
document.getElementById("range-12w").onclick = () => setPresetWeeks(12);
function setPresetWeeks(n) {
  const today = new Date();
  document.getElementById("export-from").value = isoDate(addDays(today, -7 * n));
  document.getElementById("export-to").value = isoDate(today);
  refreshExport();
}

document.getElementById("close-export").onclick = () => document.getElementById("export-modal").classList.remove("open");
document.getElementById("copy-export").onclick = async (e) => {
  await navigator.clipboard.writeText(document.getElementById("export-text").value);
  e.target.textContent = "Copied ✓";
  setTimeout(() => (e.target.textContent = "Copy to clipboard"), 1500);
};
document.getElementById("download-md").onclick = () => {
  const { from, to } = exportRange();
  download(`training-log${rangeSuffix()}.md`, buildMarkdown(from, to), "text/markdown");
};
document.getElementById("download-json").onclick = () => {
  const { from, to } = exportRange();
  download(`training-log${rangeSuffix()}.json`, JSON.stringify(dataInRange(from, to), null, 2), "application/json");
};
document.getElementById("export-modal").onclick = (e) => { if (e.target.id === "export-modal") e.target.classList.remove("open"); };

// datalist for segment label suggestions
const dl = document.createElement("datalist");
dl.id = "seg-labels";
dl.innerHTML = SEG_PRESETS.map(p => `<option value="${p}">`).join("");
document.body.appendChild(dl);

// ---------- init ----------
(async function init() {
  try {
    const res = await fetch("/api/data");
    data = normalize(await res.json());
  } catch {
    data = { days: {}, templates: [] };
  }
  if (window.innerWidth >= 1000) document.body.classList.add("sidebar");
  lastAuto = autoMode();
  viewMode = lastAuto;
  renderSidebar();
  renderCalendar();
})();
</script>
